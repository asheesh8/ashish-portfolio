<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi RS6 GT — 3D Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --accent: #b8001f; --accent2: #e8c84a; --muted: rgba(255,255,255,.4); --text: #f0f0f0; }

body {
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 40%, #0f0808 100%);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

.widget-wrap { position: relative; width: 100%; height: 100vh; }

#canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%; display: block;
}

/* ── TOP UI ── */
.ui-top {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 32px 48px;
  display: flex; align-items: flex-start; justify-content: space-between;
  z-index: 10; pointer-events: none;
}
.car-brand {
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: .28em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.car-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(44px, 7vw, 84px);
  letter-spacing: .06em; line-height: .9; color: #fff;
  text-shadow: 0 0 60px rgba(0,0,0,.6);
}
.car-gen {
  font-size: 12px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); margin-top: 8px;
}
/* Audi rings SVG */
.audi-rings {
  margin-bottom: 10px; opacity: .7;
}
.color-readout { text-align: right; pointer-events: none; }
.color-readout-label {
  font-size: 10px; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.color-readout-name { font-family: 'DM Mono', monospace; font-size: 15px; color: #fff; }

/* ── BOTTOM UI ── */
.ui-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 32px 48px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  z-index: 10;
}
.swatch-label {
  font-size: 10px; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}
.swatches { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.swatch {
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent;
  transition: transform .2s, border-color .2s, box-shadow .2s; position: relative;
}
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,.3); }
.tip {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.85); color: #fff; font-size: 11px;
  white-space: nowrap; padding: 4px 10px; border-radius: 6px;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.swatch:hover .tip { opacity: 1; }
.swatch-divider {
  width: 1px; height: 24px; background: rgba(255,255,255,.15); margin: 0 4px;
}

/* view toggle */
.view-toggle {
  position: absolute; top: 50%; right: 32px;
  transform: translateY(-50%);
  z-index: 10; display: flex; flex-direction: column; gap: 10px;
}
.view-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.5);
  padding: 10px 18px; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  backdrop-filter: blur(8px); transition: all .2s;
}
.view-btn.active {
  background: rgba(255,255,255,.15);
  border-color: rgba(255,255,255,.35); color: #fff;
}
.package-toggle {
  position: absolute; top: calc(50% + 92px); right: 32px;
  z-index: 10; display: flex; flex-direction: column; gap: 8px;
}
.package-label {
  font-size: 9px; font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; color: var(--muted); text-align: right;
}
.package-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.55);
  padding: 9px 14px; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  backdrop-filter: blur(8px); transition: all .2s;
}
.package-btn.active {
  background: rgba(255,255,255,.15);
  border-color: rgba(255,255,255,.35); color: #fff;
}

/* specs */
.specs { display: flex; gap: 28px; align-items: flex-end; }
.spec { text-align: right; }
.spec-val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: .06em; line-height: 1; color: #fff; }
.spec-unit { font-size: 12px; color: var(--accent); font-weight: 600; }
.spec-label { font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* drag hint */
.drag-hint {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.3); display: flex; align-items: center; gap: 10px;
  z-index: 10; transition: opacity .6s; pointer-events: none;
}
.drag-hint .ln { width: 24px; height: 1px; background: rgba(255,255,255,.2); }

/* loader */
#loader {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100; transition: opacity .8s;
}
.load-logo { margin-bottom: 20px; opacity: .6; }
.load-name { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: .15em; color: #fff; margin-bottom: 6px; }
.load-sub { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; }
.load-track { width: 160px; height: 1px; background: rgba(255,255,255,.12); position: relative; overflow: hidden; }
.load-fill {
  position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: slide 1.1s ease-in-out infinite;
}
@keyframes slide { from{left:-100%} to{left:100%} }

@media(max-width:600px) {
  .ui-top { padding: 20px 20px; }
  .ui-bottom { padding: 20px 20px; flex-wrap: wrap; }
  .specs { gap: 16px; }
  .car-name { font-size: 40px; }
  .view-toggle { right: 12px; }
  .view-btn { padding: 8px 12px; font-size: 10px; }
  .package-toggle { top: auto; right: 20px; bottom: 116px; }
  .package-btn { padding: 7px 10px; font-size: 9px; }
}
</style>
</head>
<body>

<div class="widget-wrap" id="widgetWrap">
  <canvas id="canvas"></canvas>

  <div id="loader">
    <!-- Audi four rings -->
    <svg class="load-logo" width="80" height="28" viewBox="0 0 80 28" fill="none">
      <circle cx="10" cy="14" r="9" stroke="white" stroke-width="2" fill="none"/>
      <circle cx="30" cy="14" r="9" stroke="white" stroke-width="2" fill="none"/>
      <circle cx="50" cy="14" r="9" stroke="white" stroke-width="2" fill="none"/>
      <circle cx="70" cy="14" r="9" stroke="white" stroke-width="2" fill="none"/>
    </svg>
    <div class="load-name">RS6 GT</div>
    <div class="load-sub">Audi · Avant · 2024</div>
    <div class="load-track"><div class="load-fill"></div></div>
  </div>

  <!-- top -->
  <div class="ui-top">
    <div>
      <svg class="audi-rings" width="56" height="20" viewBox="0 0 80 28" fill="none">
        <circle cx="10" cy="14" r="9" stroke="rgba(255,255,255,.6)" stroke-width="2" fill="none"/>
        <circle cx="30" cy="14" r="9" stroke="rgba(255,255,255,.6)" stroke-width="2" fill="none"/>
        <circle cx="50" cy="14" r="9" stroke="rgba(255,255,255,.6)" stroke-width="2" fill="none"/>
        <circle cx="70" cy="14" r="9" stroke="rgba(255,255,255,.6)" stroke-width="2" fill="none"/>
      </svg>
      <div class="car-brand">Audi</div>
      <div class="car-name">RS6<br>GT</div>
      <div class="car-gen">Avant · 2024</div>
    </div>
  </div>

  <!-- view toggle -->
  <div class="view-toggle">
    <button class="view-btn active" id="btnExt" onclick="setView('exterior')">Exterior</button>
    <button class="view-btn" id="btnInt" onclick="setView('interior')">Interior</button>
  </div>

  <div class="package-toggle">
    <div class="package-label">Trim</div>
    <button class="package-btn active" id="btnCarbon" onclick="setTrimPackage('carbon')">Carbon</button>
    <button class="package-btn" id="btnBlackOptics" onclick="setTrimPackage('black')">Black Optics</button>
  </div>

  <!-- drag hint -->
  <div class="drag-hint" id="dragHint">
    <span class="ln"></span>drag to rotate<span class="ln"></span>
  </div>

  <!-- bottom -->
  <div class="ui-bottom">
    <div class="specs">
      <div class="spec">
        <div class="spec-val">630<span class="spec-unit">hp</span></div>
        <div class="spec-label">Power</div>
      </div>
      <div class="spec">
        <div class="spec-val">3.3<span class="spec-unit">s</span></div>
        <div class="spec-label">0–60</div>
      </div>
      <div class="spec">
        <div class="spec-val">190<span class="spec-unit">mph</span></div>
        <div class="spec-label">Top Speed</div>
      </div>
      <div class="spec">
        <div class="spec-val">4.0<span class="spec-unit">L</span></div>
        <div class="spec-label">Twin-Turbo V8</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let chromeMaterials = [];
let blackoutMaterials = [];
let carbonMaterials = [];
let trimPackage = 'carbon';

function applyTrimPackage() {
  const isBlack = trimPackage === 'black';
  chromeMaterials.forEach(mat => {
    mat.color.setHex(isBlack ? 0x050506 : 0xd8d8d2);
    mat.metalness = isBlack ? 0.45 : 1;
    mat.roughness = isBlack ? 0.32 : 0.12;
  });
  blackoutMaterials.forEach(mat => {
    mat.color.setHex(0x050506);
    mat.metalness = 0.32;
    mat.roughness = 0.34;
  });
  carbonMaterials.forEach(mat => {
    mat.color.setHex(isBlack ? 0x050506 : 0x090a0b);
    mat.metalness = 0.18;
    mat.roughness = isBlack ? 0.28 : 0.22;
  });
}

function setTrimPackage(pkg) {
  trimPackage = pkg;
  document.getElementById('btnCarbon').classList.toggle('active', pkg === 'carbon');
  document.getElementById('btnBlackOptics').classList.toggle('active', pkg === 'black');
  applyTrimPackage();
}

// ── SCENE ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 1.6, 6.5);
camera.lookAt(0, 0.6, 0);

// ── LIGHTING ──
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const key = new THREE.DirectionalLight(0xfff8f0, 1.8);
key.position.set(6, 10, 5); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
scene.add(key);

const fill = new THREE.DirectionalLight(0xaabbff, 0.5);
fill.position.set(-6, 3, -3); scene.add(fill);

// red rim light matching Audi accent
const rimR = new THREE.DirectionalLight(0xff1a2a, 0.6);
rimR.position.set(-4, 1, -8); scene.add(rimR);

const topLight = new THREE.DirectionalLight(0xffffff, 0.35);
topLight.position.set(0, 12, 0); scene.add(topLight);

const under = new THREE.PointLight(0x1a1a2e, 0.6, 10);
under.position.set(0, -0.8, 0); scene.add(under);

// ── CAR GROUP ──
const carGroup = new THREE.Group();
scene.add(carGroup);

// ── MATERIAL CLASSIFICATION (by mesh/mat name only — no texture URL noise) ──
const MAT = {
  GLASS:    { test: /glass|window|windshield/i },
  LIGHT:    { test: /light|lamp|lens|reflector|turn|signal/i },
  TIRE:     { test: /tire|tyre|rubber/i },
  RIM:      { test: /rim|wheel/i },
  CALIPER:  { test: /caliper|brake/i },
  CARBON:   { test: /carbon|diffuser|splitter|spoiler|skirt|aero/i },
  CHROME:   { test: /chrome|badge|logo|emblem|ring|exhaust|tailpipe/i },
  BLACKOUT: { test: /grille|grill|wiper|antenna|intake|sensor|radar|camera|pdc|seal/i },
  INTERIOR: { test: /int_|interior|seat|cabin|dash|steer|cockpit|headliner/i },
};

function classify(mesh, mat) {
  const h = (mesh.name + ' ' + (mat?.name || '')).toLowerCase();
  if (MAT.GLASS.test.test(h))    return 'glass';
  if (MAT.LIGHT.test.test(h))    return 'light';
  if (MAT.TIRE.test.test(h))     return 'tire';
  if (MAT.CALIPER.test.test(h))  return 'caliper';
  if (MAT.RIM.test.test(h))      return 'rim';
  if (MAT.CARBON.test.test(h))   return 'carbon';
  if (MAT.CHROME.test.test(h))   return 'chrome';
  if (MAT.BLACKOUT.test.test(h)) return 'blackout';
  if (MAT.INTERIOR.test.test(h)) return 'interior';
  // If original mat is very dark (tire/rubber/blackout), don't paint it body
  if (mat?.color) {
    const b = mat.color.r * 0.299 + mat.color.g * 0.587 + mat.color.b * 0.114;
    if (b < 0.04) return 'blackout';
  }
  return 'body';
}

// Shared fresh materials — created once, reused
const MAT_GLASS    = new THREE.MeshStandardMaterial({ color:0x0a1520, metalness:0.02, roughness:0.04, transparent:true, opacity:0.32 });
const MAT_LIGHT    = new THREE.MeshStandardMaterial({ color:0xf0f0e8, metalness:0.02, roughness:0.06, transparent:true, opacity:0.78 });
const MAT_TIRE     = new THREE.MeshStandardMaterial({ color:0x101012, metalness:0.04, roughness:0.82 });
const MAT_RIM      = new THREE.MeshStandardMaterial({ color:0x1c1e22, metalness:0.88, roughness:0.16 });
const MAT_CALIPER  = new THREE.MeshStandardMaterial({ color:0xcc0820, metalness:0.42, roughness:0.28 });
const MAT_INTERIOR = new THREE.MeshStandardMaterial({ color:0x181008, metalness:0.08, roughness:0.65 });

const MAT_CARBON   = new THREE.MeshStandardMaterial({ color:0x090a0b, metalness:0.20, roughness:0.22 });
const MAT_CHROME   = new THREE.MeshStandardMaterial({ color:0xd8d8d2, metalness:1.0,  roughness:0.10 });
const MAT_BLACKOUT = new THREE.MeshStandardMaterial({ color:0x060607, metalness:0.30, roughness:0.36 });
carbonMaterials.push(MAT_CARBON);
chromeMaterials.push(MAT_CHROME);
blackoutMaterials.push(MAT_BLACKOUT);

function getMat(type) {
  switch(type) {
    case 'glass':    return MAT_GLASS;
    case 'light':    return MAT_LIGHT;
    case 'tire':     return MAT_TIRE;
    case 'rim':      return MAT_RIM;
    case 'caliper':  return MAT_CALIPER;
    case 'carbon':   return MAT_CARBON;
    case 'chrome':   return MAT_CHROME;
    case 'blackout': return MAT_BLACKOUT;
    case 'interior': return MAT_INTERIOR;
    default:         return null; // keep original model material for unclassified meshes
  }
}

const loader = new THREE.GLTFLoader();
loader.load('audi_rs6gt_avant.glb', gltf => {
  const model = gltf.scene;

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 5 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(scale);
  model.position.set(-center.x*scale, -box.min.y*scale, -center.z*scale);

  model.traverse(child => {
    if (!child.isMesh) return;
    child.castShadow = true;
    child.receiveShadow = true;

    if (Array.isArray(child.material)) {
      child.material = child.material.map((m, i) => getMat(classify(child, m)) ?? child.material[i]);
    } else {
      child.material = getMat(classify(child, child.material)) ?? child.material;
    }
  });

  applyTrimPackage();
  carGroup.add(model);

  const loaderEl = document.getElementById('loader');
  loaderEl.style.opacity = '0';
  setTimeout(() => loaderEl.style.display = 'none', 800);

}, undefined, err => {
  console.error('Load error:', err);
  document.getElementById('loader').style.opacity = '0';
});

// ── VIEW SWITCHING ──
let currentView = 'exterior';
const EXT_CAM = { x:0, y:1.6, z:6.5, lx:0, ly:0.6, lz:0 };
const INT_CAM = { x: 0.0, y: 1.6, z: 1.8, lx: 0.0, ly: 0.4, lz: -2.0 };
let camTarget = {...EXT_CAM};
let camCurrent = {...EXT_CAM};
let intLookH = 0, intLookV = 0, targetIntLookH = 0, targetIntLookV = 0;

function setView(view) {
  currentView = view;
  const btnExt = document.getElementById('btnExt');
  const btnInt = document.getElementById('btnInt');
  if (view === 'interior') {
    camTarget = {...INT_CAM};
    autoRotate = false; clearTimeout(autoTimer);
    targetRotY = 0; targetRotX = 0; rotY = 0; rotX = 0;
    carGroup.rotation.set(0,0,0);
    intLookH = 0; intLookV = 0; targetIntLookH = 0; targetIntLookV = 0;
    btnInt.classList.add('active'); btnExt.classList.remove('active');
  } else {
    camTarget = {...EXT_CAM};
    targetZoom = 6.5; camCurrent.z = 6.5;
    camera.position.set(EXT_CAM.x, EXT_CAM.y, 6.5);
    camera.lookAt(EXT_CAM.lx, EXT_CAM.ly, EXT_CAM.lz);
    btnExt.classList.add('active'); btnInt.classList.remove('active');
    autoTimer = setTimeout(() => autoRotate = true, 1500);
  }
}

// ── DRAG ──
let isDragging = false, prevX = 0, prevY = 0;
let targetRotY = -0.3, targetRotX = 0.04, rotY = -0.3, rotX = 0.04;
let autoRotate = true, autoTimer;
let isPanning = false, panPrevX = 0, panPrevY = 0;
let targetPanX = 0, targetPanY = 0, panX = 0, panY = 0;
let targetZoom = 6.5;

const dragHint = document.getElementById('dragHint');

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isDragging = true; prevX = e.clientX; prevY = e.clientY;
    autoRotate = false; clearTimeout(autoTimer);
    dragHint.style.opacity = '0';
  } else if (e.button === 2) {
    isPanning = true; panPrevX = e.clientX; panPrevY = e.clientY;
  }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    if (currentView === 'interior') {
      targetIntLookH += (e.clientX - prevX) * 0.004;
      targetIntLookV -= (e.clientY - prevY) * 0.003;
      targetIntLookH = Math.max(-2.5, Math.min(2.5, targetIntLookH));
      targetIntLookV = Math.max(-0.8, Math.min(0.8, targetIntLookV));
    } else {
      targetRotY += (e.clientX - prevX) * 0.007;
      targetRotX += (e.clientY - prevY) * 0.003;
      targetRotX = Math.max(-0.25, Math.min(0.35, targetRotX));
    }
    prevX = e.clientX; prevY = e.clientY;
  }
  if (isPanning && currentView === 'exterior') {
    targetPanX += (e.clientX - panPrevX) * 0.004;
    targetPanY -= (e.clientY - panPrevY) * 0.004;
    panPrevX = e.clientX; panPrevY = e.clientY;
  }
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) { isDragging = false; autoTimer = setTimeout(() => autoRotate = true, 4000); }
  if (e.button === 2) isPanning = false;
});
canvas.addEventListener('mouseleave', () => { isDragging = false; isPanning = false; });

canvas.addEventListener('touchstart', e => {
  isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  autoRotate = false; dragHint.style.opacity = '0';
}, {passive:true});
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const t = e.touches[0];
  if (currentView === 'interior') {
    targetIntLookH += (t.clientX - prevX) * 0.004;
    targetIntLookV -= (t.clientY - prevY) * 0.003;
    targetIntLookH = Math.max(-2.5, Math.min(2.5, targetIntLookH));
    targetIntLookV = Math.max(-0.8, Math.min(0.8, targetIntLookV));
  } else {
    targetRotY += (t.clientX - prevX) * 0.007;
    targetRotX += (t.clientY - prevY) * 0.003;
    targetRotX = Math.max(-0.25, Math.min(0.35, targetRotX));
  }
  prevX = t.clientX; prevY = t.clientY;
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', () => {
  isDragging = false;
  autoTimer = setTimeout(() => autoRotate = true, 4000);
});

canvas.addEventListener('wheel', e => {
  targetZoom += e.deltaY * 0.004;
  targetZoom = Math.max(2.5, Math.min(12, targetZoom));
  e.preventDefault();
}, {passive:false});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── RENDER ──
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (autoRotate && currentView === 'exterior') targetRotY += dt * 0.22;

  rotY += (targetRotY - rotY) * 0.07;
  rotX += (targetRotX - rotX) * 0.07;
  panX += (targetPanX - panX) * 0.07;
  panY += (targetPanY - panY) * 0.07;

  if (currentView === 'exterior') {
    carGroup.rotation.y = rotY;
    carGroup.rotation.x = rotX;
  }
  carGroup.position.x = panX;
  carGroup.position.y = panY;

  if (currentView === 'interior') {
    camCurrent.x += (camTarget.x - camCurrent.x) * 0.06;
    camCurrent.y += (camTarget.y - camCurrent.y) * 0.06;
    camCurrent.z += (camTarget.z - camCurrent.z) * 0.06;
    camera.position.set(camCurrent.x, camCurrent.y, camCurrent.z);
    intLookH += (targetIntLookH - intLookH) * 0.08;
    intLookV += (targetIntLookV - intLookV) * 0.08;
    camera.lookAt(INT_CAM.lx + intLookH * 2.5, INT_CAM.ly + intLookV, INT_CAM.lz);
  } else {
    camera.position.z += (targetZoom - camera.position.z) * 0.08;
    camera.lookAt(0, 0.6, 0);
  }

  renderer.render(scene, camera);
})();

window.addEventListener('pagehide', () => {
  renderer.dispose();
  renderer.forceContextLoss();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche 911 GT3 RS — 3D Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --accent: #e8611a; --muted: rgba(255,255,255,.4); --text: #f0f0f0; }

body {
  /* simulating the portfolio background so you can see it blends */
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #8b2635 70%, #c0392b 100%);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── THE WIDGET CONTAINER ── */
.widget-wrap {
  position: relative;
  width: 100%;
  height: 100vh;
  /* transparent — shows through to body background */
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  /* transparent canvas so bg shows through */
  background: transparent;
}

/* ── TOP UI ── */
.ui-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 32px 48px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  z-index: 10;
  pointer-events: none;
}
.car-title-group { pointer-events: none; }
.car-brand {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .28em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 6px;
}
.car-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 7vw, 88px);
  letter-spacing: .06em; line-height: .9;
  color: #fff;
  text-shadow: 0 0 60px rgba(0,0,0,.5);
}
.car-gen {
  font-size: 12px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); margin-top: 8px;
}
.color-readout {
  text-align: right; pointer-events: none;
}
.color-readout-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}
.color-readout-name {
  font-family: 'DM Mono', monospace;
  font-size: 15px; color: #fff;
}

/* ── BOTTOM UI ── */
.ui-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 32px 48px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  z-index: 10;
}

/* color swatches */
.swatch-group {}
.swatch-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}
.swatches { display: flex; gap: 10px; align-items: center; }
.swatch {
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  position: relative;
}
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,.3); }
.tip {
  position: absolute; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.8); color: #fff;
  font-size: 11px; white-space: nowrap;
  padding: 4px 10px; border-radius: 6px;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.swatch:hover .tip { opacity: 1; }

/* specs */
.specs { display: flex; gap: 28px; align-items: flex-end; }
.spec { text-align: right; }
.spec-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; letter-spacing: .06em; line-height: 1;
  color: #fff;
}
.spec-unit { font-size: 12px; color: var(--accent); font-weight: 600; }
.spec-label {
  font-size: 9px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); margin-top: 3px;
}

/* drag hint */
.drag-hint {
  position: absolute;
  bottom: 90px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 500; letter-spacing: .2em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  display: flex; align-items: center; gap: 10px;
  z-index: 10; transition: opacity .6s; pointer-events: none;
}
.drag-hint .ln { width: 24px; height: 1px; background: rgba(255,255,255,.2); }

/* loader */
#loader {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; transition: opacity .8s;
  background: transparent;
}
.load-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px; letter-spacing: .15em; color: #fff;
  text-shadow: 0 0 40px rgba(0,0,0,.6);
  margin-bottom: 6px;
}
.load-sub {
  font-size: 11px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 36px;
}
.load-track { width: 160px; height: 1px; background: rgba(255,255,255,.12); position: relative; overflow: hidden; }
.load-fill {
  position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: slide 1.1s ease-in-out infinite;
}
@keyframes slide { from{left:-100%} to{left:100%} }
</style>
</head>
<body>

<div class="widget-wrap" id="widgetWrap">
  <canvas id="canvas"></canvas>

  <div id="loader">
    <div class="load-name">GT3 RS</div>
    <div class="load-sub">Porsche 911 · 992</div>
    <div class="load-track"><div class="load-fill"></div></div>
  </div>

  <!-- top -->
  <div class="ui-top">
    <div class="car-title-group">
      <div class="car-brand">Porsche</div>
      <div class="car-name">911<br>GT3 RS</div>
      <div class="car-gen">992 Generation</div>
    </div>
    <div class="color-readout">
      <div class="color-readout-label">Paint</div>
      <div class="color-readout-name" id="colorName">Lava Orange</div>
    </div>
  </div>

  <!-- drag hint -->
  <div class="drag-hint" id="dragHint">
    <span class="ln"></span>drag to rotate<span class="ln"></span>
  </div>

  <!-- view toggle -->
  <div style="position:absolute;top:50%;right:32px;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:10px;">
    <button onclick="setView('exterior')" id="btnExt" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:10px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(8px);transition:all .2s;">Exterior</button>
    <button onclick="setView('interior')" id="btnInt" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:10px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;backdrop-filter:blur(8px);transition:all .2s;">Interior</button>
  </div>

  <!-- bottom -->
  <div class="ui-bottom">
    <div class="swatch-group">
      <div class="swatch-label">Color</div>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="specs">
      <div class="spec">
        <div class="spec-val">518<span class="spec-unit">hp</span></div>
        <div class="spec-label">Power</div>
      </div>
      <div class="spec">
        <div class="spec-val">2.9<span class="spec-unit">s</span></div>
        <div class="spec-label">0–60</div>
      </div>
      <div class="spec">
        <div class="spec-val">184<span class="spec-unit">mph</span></div>
        <div class="spec-label">Top Speed</div>
      </div>
      <div class="spec">
        <div class="spec-val">4.0<span class="spec-unit">L</span></div>
        <div class="spec-label">Flat-6 NA</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const COLORS = [
  // Standard
  { name:'Lava Orange',     hex:'#d45a10', val:0xd45a10, rare:false },
  { name:'Guards Red',      hex:'#c0122a', val:0xc0122a, rare:false },
  { name:'Racing Yellow',   hex:'#f0c500', val:0xf0c500, rare:false },
  { name:'Chalk',           hex:'#dedad4', val:0xdedad4, rare:false },
  { name:'GT Silver Met.',  hex:'#8c9099', val:0x8c9099, rare:false },
  { name:'Jet Black',       hex:'#151515', val:0x151515, rare:false },
  // Rare / PTS
  { name:'Lizard Green ✦',  hex:'#5aad3a', val:0x5aad3a, rare:true },
  { name:'Python Green ✦',  hex:'#7ab830', val:0x7ab830, rare:true },
  { name:'Frozen Blue ✦',   hex:'#3a6a9c', val:0x3a6a9c, rare:true },
  { name:'Riviera Blue ✦',  hex:'#1a3f7a', val:0x1a3f7a, rare:true },
  { name:'Ultraviolet ✦',   hex:'#3d1a6e', val:0x3d1a6e, rare:true },
  { name:'Indian Red ✦',    hex:'#7a1a2a', val:0x7a1a2a, rare:true },
  { name:'Pastel Yellow ✦', hex:'#e8d88a', val:0xe8d88a, rare:true },
  { name:'Rubystar ✦',      hex:'#8b1a3a', val:0x8b1a3a, rare:true },
];

let bodyMaterials = [];
let currentColor = COLORS[0].val;

// swatches
const swatchWrap = document.getElementById('swatches');
const colorNameEl = document.getElementById('colorName');
// add rare label
const rareLabel = document.createElement('div');
rareLabel.style.cssText = 'font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,200,80,.7);margin-bottom:8px;margin-top:14px;display:none;';
rareLabel.textContent = 'Paint to Sample';
rareLabel.id = 'rareLabel';
swatchWrap.parentElement.appendChild(rareLabel);

COLORS.forEach((c, i) => {
  if (i === 6) { // first rare color — show label before it
    swatchWrap.parentElement.insertBefore(rareLabel, swatchWrap);
    rareLabel.style.display = 'block';
  }
  const el = document.createElement('div');
  el.className = 'swatch' + (i===0?' active':'');
  el.style.background = c.hex;
  if (c.rare) el.style.boxShadow = '0 0 8px rgba(255,200,80,.4)';
  el.innerHTML = `<div class="tip">${c.name}</div>`;
  el.onclick = () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    colorNameEl.textContent = c.name;
    currentColor = c.val;
    bodyMaterials.forEach(m => m.color.setHex(c.val));
  };
  swatchWrap.appendChild(el);
});

// ── THREE SETUP — transparent renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.setClearColor(0x000000, 0); // fully transparent

const scene = new THREE.Scene();
// no background — transparent

// ── CAMERA — zoomed in tight ──
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.4, 5.5); // closer, slightly elevated
camera.lookAt(0, 0.6, 0);

// ── LIGHTS — no ground needed, just light the car ──
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const key = new THREE.DirectionalLight(0xfff5ee, 2.0);
key.position.set(6, 8, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
scene.add(key);

const fill = new THREE.DirectionalLight(0x8899ff, 0.7);
fill.position.set(-6, 3, -3);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xff7733, 0.9);
rim.position.set(-4, 1, -7);
scene.add(rim);

const topLight = new THREE.DirectionalLight(0xffffff, 0.4);
topLight.position.set(0, 10, 0);
scene.add(topLight);

// subtle point under car for a glow
const under = new THREE.PointLight(0x2244aa, 0.8, 8);
under.position.set(0, -0.5, 0);
scene.add(under);

// ── CAR GROUP ──
const carGroup = new THREE.Group();
scene.add(carGroup);

// ── LOAD MODEL ──
const loader = new THREE.GLTFLoader();
loader.load('porsche_gt3_rs.glb', gltf => {
  const model = gltf.scene;

  // fit + center
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 4.5 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(scale);
  model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

  // log all mesh names to console so we can debug
  model.traverse(child => {
    if (child.isMesh) console.log('MESH:', child.name, '| MAT:', child.material?.name, '| color:', child.material?.color);
  });

  model.traverse(child => {
    if (!child.isMesh) return;
    child.castShadow = true;
    child.receiveShadow = true;
    if (!child.material || Array.isArray(child.material)) return;
    const mat = child.material.clone();
    child.material = mat;
    const n = (child.name + '|' + (mat.name||'')).toLowerCase();

    // EXCLUDE: badges, logos, glass, rubber, tires, trim, chrome, lights
    const isExcluded = /badge|logo|emblem|letter|text|chrome|glass|window|windshield|lens|light|lamp|rubber|tire|tyre|wheel|rim|brake|caliper|wiper|antenna|mirror_glass|number|plate/.test(n);
    if (isExcluded) return;

    // INCLUDE: known body panel names
    const isNamedBody = /body|paint|hood|door|fender|panel|bumper|roof|wing|trunk|bonnet|shell|exterior|skirt|splitter|diffuser|spoiler/.test(n);

    // INCLUDE: large meshes with orange/red hue (the actual factory paint)
    const col = mat.color;
    const isOrangeish = col && col.r > 0.3 && col.r > col.g * 1.2 && col.r > col.b * 1.5;

    // size check — skip tiny meshes (badges are small geometry)
    const meshBox = new THREE.Box3().setFromObject(child);
    const meshSize = meshBox.getSize(new THREE.Vector3());
    const meshVol = meshSize.x * meshSize.y * meshSize.z;
    const isBigEnough = meshVol > 0.01;

    if ((isNamedBody || isOrangeish) && isBigEnough && !isExcluded) {
      mat.metalness = 0.15;
      mat.roughness = 0.3;
      bodyMaterials.push(mat);
    }
  });

  bodyMaterials.forEach(m => m.color.setHex(currentColor));
  carGroup.add(model);

  const loaderEl = document.getElementById('loader');
  loaderEl.style.opacity = '0';
  setTimeout(() => loaderEl.style.display = 'none', 800);

}, undefined, err => {
  console.error(err);
  document.getElementById('loader').style.opacity = '0';
});

// ── DRAG + PAN ──
let isDragging = false;
let prevX = 0, prevY = 0;
let targetRotY = -0.3, targetRotX = 0.05;
let rotY = -0.3, rotX = 0.05;
let autoRotate = true, autoTimer;

// pan (right-click or two-finger)
let isPanning = false;
let panPrevX = 0, panPrevY = 0;
let panX = 0, panY = 0, targetPanX = 0, targetPanY = 0;

const dragHint = document.getElementById('dragHint');

// LEFT DRAG = rotate
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isDragging = true; prevX = e.clientX; prevY = e.clientY;
    autoRotate = false; clearTimeout(autoTimer);
    dragHint.style.opacity = '0';
  } else if (e.button === 2) {
    isPanning = true; panPrevX = e.clientX; panPrevY = e.clientY;
  }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    if (currentView === 'interior') {
      // in interior: drag = look around from driver seat
      targetIntLookH += (e.clientX - prevX) * 0.004;
      targetIntLookV -= (e.clientY - prevY) * 0.003;
      targetIntLookH = Math.max(-2.5, Math.min(2.5, targetIntLookH));
      targetIntLookV = Math.max(-0.8, Math.min(0.8, targetIntLookV));
    } else {
      targetRotY += (e.clientX - prevX) * 0.007;
      targetRotX += (e.clientY - prevY) * 0.003;
      targetRotX = Math.max(-0.3, Math.min(0.4, targetRotX));
    }
    prevX = e.clientX; prevY = e.clientY;
  }
  if (isPanning && currentView === 'exterior') {
    targetPanX += (e.clientX - panPrevX) * 0.004;
    targetPanY -= (e.clientY - panPrevY) * 0.004;
    panPrevX = e.clientX; panPrevY = e.clientY;
  }
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 0) { isDragging = false; autoTimer = setTimeout(() => autoRotate = true, 4000); }
  if (e.button === 2) isPanning = false;
});
canvas.addEventListener('mouseleave', () => { isDragging = false; isPanning = false; });

// touch rotate
let t0 = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true; t0 = e.touches[0];
    prevX = t0.clientX; prevY = t0.clientY;
    autoRotate = false; clearTimeout(autoTimer);
    dragHint.style.opacity = '0';
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length === 1) {
    const t = e.touches[0];
    if (currentView === 'interior') {
      targetIntLookH += (t.clientX - prevX) * 0.004;
      targetIntLookV -= (t.clientY - prevY) * 0.003;
      targetIntLookH = Math.max(-2.5, Math.min(2.5, targetIntLookH));
      targetIntLookV = Math.max(-0.8, Math.min(0.8, targetIntLookV));
    } else {
      targetRotY += (t.clientX - prevX) * 0.007;
      targetRotX += (t.clientY - prevY) * 0.003;
      targetRotX = Math.max(-0.3, Math.min(0.4, targetRotX));
    }
    prevX = t.clientX; prevY = t.clientY;
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => {
  isDragging = false;
  autoTimer = setTimeout(() => autoRotate = true, 4000);
});

// scroll to zoom — smooth with target lerp
let targetZoom = 5.5;
canvas.addEventListener('wheel', e => {
  targetZoom += e.deltaY * 0.004;
  targetZoom = Math.max(2.8, Math.min(10, targetZoom));
  e.preventDefault();
}, { passive: false });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── VIEW SWITCHING ──
let currentView = 'exterior';

// exterior cam defaults
const EXT_CAM = { x: 0, y: 1.4, z: 5.5, lx: 0, ly: 0.6, lz: 0 };
// interior — driver seat POV looking at dash/steering
const INT_CAM = { x: 0.0, y: 1.1, z: 1.0, lx: 0.0, ly: 0.8, lz: -2.0 };

let camTarget = { ...EXT_CAM };
let camCurrent = { x: EXT_CAM.x, y: EXT_CAM.y, z: EXT_CAM.z, lx: EXT_CAM.lx, ly: EXT_CAM.ly, lz: EXT_CAM.lz };

// interior look-around angles
let intLookH = 0, intLookV = 0; // horizontal, vertical look offset
let targetIntLookH = 0, targetIntLookV = 0;

function setView(view) {
  currentView = view;
  const btnExt = document.getElementById('btnExt');
  const btnInt = document.getElementById('btnInt');

  if (view === 'interior') {
    camTarget = { ...INT_CAM };
    autoRotate = false;
    clearTimeout(autoTimer);
    // reset car group rotation so interior looks right
    targetRotY = 0; targetRotX = 0; rotY = 0; rotX = 0;
    carGroup.rotation.y = 0; carGroup.rotation.x = 0;
    // reset interior look
    intLookH = 0; intLookV = 0; targetIntLookH = 0; targetIntLookV = 0;
    btnInt.style.background = 'rgba(255,255,255,.15)';
    btnInt.style.borderColor = 'rgba(255,255,255,.3)';
    btnInt.style.color = '#fff';
    btnExt.style.background = 'rgba(255,255,255,.05)';
    btnExt.style.borderColor = 'rgba(255,255,255,.12)';
    btnExt.style.color = 'rgba(255,255,255,.5)';
  } else {
    camTarget = { ...EXT_CAM };
    // hard reset zoom target AND current so it snaps back clean
    targetZoom = 5.5;
    camCurrent.z = 5.5;
    camera.position.set(EXT_CAM.x, EXT_CAM.y, 5.5);
    camera.lookAt(EXT_CAM.lx, EXT_CAM.ly, EXT_CAM.lz);
    btnExt.style.background = 'rgba(255,255,255,.15)';
    btnExt.style.borderColor = 'rgba(255,255,255,.3)';
    btnExt.style.color = '#fff';
    btnInt.style.background = 'rgba(255,255,255,.05)';
    btnInt.style.borderColor = 'rgba(255,255,255,.12)';
    btnInt.style.color = 'rgba(255,255,255,.5)';
    autoTimer = setTimeout(() => autoRotate = true, 1500);
  }
}

// ── RENDER ──
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (autoRotate) targetRotY += dt * 0.25;
  rotY += (targetRotY - rotY) * 0.07;
  rotX += (targetRotX - rotX) * 0.07;
  panX += (targetPanX - panX) * 0.07;
  panY += (targetPanY - panY) * 0.07;
  if (currentView === 'exterior') {
    carGroup.rotation.y = rotY;
    carGroup.rotation.x = rotX;
  }
  carGroup.position.x = panX;
  carGroup.position.y = panY;
  // smooth camera lerp (handles both zoom and interior transition)
  if (currentView === 'interior') {
    // lerp camera position to interior spot
    camCurrent.x += (camTarget.x - camCurrent.x) * 0.06;
    camCurrent.y += (camTarget.y - camCurrent.y) * 0.06;
    camCurrent.z += (camTarget.z - camCurrent.z) * 0.06;
    camera.position.set(camCurrent.x, camCurrent.y, camCurrent.z);
    // lerp look-around
    intLookH += (targetIntLookH - intLookH) * 0.08;
    intLookV += (targetIntLookV - intLookV) * 0.08;
    // look direction from driver seat: base looks at dash, drag shifts it
    const lookX = INT_CAM.lx + intLookH * 2.5;
    const lookY = INT_CAM.ly + intLookV;
    const lookZ = INT_CAM.lz;
    camera.lookAt(lookX, lookY, lookZ);
  } else {
    camera.position.z += (targetZoom - camera.position.z) * 0.08;
    camera.lookAt(0, 0.6, 0);
  }
  renderer.render(scene, camera);
})();
</script>
